<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.5;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            color: #24292f;
            background-color: #ffffff;
        }
        .container {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 2rem;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            background-color: #dafbe1;
            color: #1a7f37;
            padding: 5px 12px;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        h1 { font-size: 2rem; margin-top: 0; }
        p { color: #57606a; }
        .timestamp { font-size: 0.75rem; color: #8c959f; margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="container">
        <span class="status-badge">Success</span>
        <h1>GitHub Pages is Live</h1>
        <p>This is a generic test page to verify repository visibility and deployment.</p>
        
        <hr style="border: 0; border-top: 1px solid #d0d7de; margin: 2rem 0;">
        
        <p>If you can see this page, your repository is successfully <strong>Public</strong> and the <strong>Pages</strong> build was successful.</p>
        
        <div class="timestamp">
            Last Deployment: March 2026
        </div>
    </div>

</body>
</html>
